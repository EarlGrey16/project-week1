<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Repair Reservations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tech Repair Reservations</h1>
            <p>Book an appointment to get your phone or computer fixed.</p>
        </header>
        <main>
            <form id="reservation-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                <div class="form-group">
                    <label for="device-type">Device Type</label>
                    <select id="device-type" name="device-type">
                        <option value="phone">Phone</option>
                        <option value="computer">Computer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="problem-description">Problem Description</label>
                    <textarea id="problem-description" name="problem-description" rows="5" required></textarea>
                </div>
                <button type="submit">Book Appointment</button>
            </form>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
