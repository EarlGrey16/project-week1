<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Repair Reservations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle-container">
            <label class="theme-switch" for="theme-toggle">
                <input type="checkbox" id="theme-toggle" aria-label="Toggle dark mode">
                <span class="slider"></span>
            </label>
        </div>
        <header>
            <h1>iPhone Doctor PC Reservations</h1>
            <p>Book an appointment to get your phone or computer fixed.</p>
        </header>
        <main>
            <form id="reservation-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890" required>
                </div>
                <div class="form-group">
                    <label for="device-type">Device Type</label>
                    <select id="device-type" name="device-type" required>
                        <option value="" disabled selected>Select Device</option>
                        <option value="phone">Phone</option>
                        <option value="computer">Computer</option>
                    </select>
                </div>
                
                <div id="brand-group" class="form-group" style="display: none;">
                    <label for="brand">Brand</label>
                    <select id="brand" name="brand">
                        <option value="" disabled selected>Select Brand</option>
                        <option value="apple">Apple</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div id="series-group" class="form-group" style="display: none;">
                    <label for="series">iPhone Series</label>
                    <select id="series" name="series">
                        <option value="" disabled selected>Select Series</option>
                        <option value="iphone16">iPhone 16</option>
                        <option value="iphone15">iPhone 15</option>
                        <option value="iphone14">iPhone 14</option>
                        <option value="iphone13">iPhone 13</option>
                        <option value="iphone12">iPhone 12</option>
                    </select>
                </div>

                <div id="model-group" class="form-group" style="display: none;">
                    <label for="model">Model</label>
                    <select id="model" name="model">
                        <option value="" disabled selected>Select Model</option>
                        <option value="normal">Normal</option>
                        <option value="plus">Plus</option>
                        <option value="pro">Pro</option>
                        <option value="pro-max">Pro Max</option>
                    </select>
                </div>

                <div id="inquiry-group" class="form-group inquiry-message" style="display: none;">
                    <p>For other devices, please come in to our shop for a direct inquiry!</p>
                </div>
                <div class="form-group">
                    <label for="reservation-date">Preferred Date</label>
                    <input type="date" id="reservation-date" name="reservation-date" required>
                </div>
                <div id="time-group" class="form-group">
                    <label for="reservation-time">Preferred Time</label>
                    <select id="reservation-time" name="reservation-time" required>
                        <option value="" disabled selected>Select a date first</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="problem-description">Problem Description</label>
                    <textarea id="problem-description" name="problem-description" rows="5" required></textarea>
                </div>
                <button type="submit">Book Appointment</button>
            </form>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
